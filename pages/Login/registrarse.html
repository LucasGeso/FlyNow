    <main>
        <form class="login-form" action="" method="post">
            <label for="usuario">Usuario</label>
            <input id="usuario" type="text" name="usuario" placeholder="Usuario">
            <label for="E-Mail">E-Mail</label>
            <input id="E-Mail" type="email" name="E-Mail" placeholder="E-Mail">
            <label for="contrasena">Contraseña</label>
            <input id="contrasena" type="password" name="contrasena" placeholder="Contraseña">
            <label for="confirmar-contrasena">Confirmar contraseña</label>
            <input id="confirmar-contrasena" type="password" name="confirmar-contrasena" placeholder="Confirmar contraseña">
            <div class="botones">
                <button class="boton" type="button">Aceptar</button>
                <button class="boton" type="reset">Cancelar</button>
            </div>
        </form>
    </main>
